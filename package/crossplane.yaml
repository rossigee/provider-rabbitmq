apiVersion: meta.pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-rabbitmq
  annotations:
    meta.crossplane.io/maintainer: Ross Golder <ross@golder.org>
    meta.crossplane.io/source: github.com/rossigee/provider-rabbitmq
    meta.crossplane.io/license: Apache-2.0
    meta.crossplane.io/description: |
      Crossplane v2 provider for managing RabbitMQ resources via the
      Management HTTP API. Supports vhosts, exchanges, queues, bindings,
      users, and permissions as namespace-scoped managed resources.
    meta.crossplane.io/readme: |
      This Crossplane v2 provider enables namespace-scoped management of
      RabbitMQ resources through Kubernetes manifests.

      Supported resources (all v1beta1, namespace-scoped):
      - VHost        - virtual host management
      - Exchange     - exchange declaration and configuration
      - Queue        - queue declaration and configuration
      - Binding      - exchange-to-queue bindings
      - User         - user accounts (password via SecretKeySelector)
      - Permission   - per-user, per-vhost ACL configuration

      TLS verification is always enforced. A custom CA bundle can be
      supplied via spec.tls.caBundleSecretRef on the ProviderConfig.
spec:
  controller:
    permissionRequests: []
  crossplane:
    version: ">=v1.14.0"
